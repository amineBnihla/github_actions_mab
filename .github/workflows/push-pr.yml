name: push and pull request tests

on:
    push:
        branches:
            - main
        paths:
            - "src/**"
            - "tests/**"
    pull_request:
        branches:
            - main
        paths:
            - "src/**"
            - "tests/**"

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - run: npm ci
            - run: npm test
