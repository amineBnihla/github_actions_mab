name: push and pull request tests

on:
    push:
        branches:
            - main
        paths:
            - "src/**"
            - "tests/**"
    pull_request:
        branches:
            - main
        paths:
            - "src/**"
            - "tests/**"

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout
              uses: actions/checkout@v4
            - name: setup node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
            - name: install dependencies
              run: npm ci
            - name: run tests
              run: npm test
